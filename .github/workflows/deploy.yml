name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # This links to your environment secrets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            cd /home/ubuntu/market-feed
            git pull origin main
            npm install

            # Create .env file with secrets (for Node.js to read)
            cat > .env << EOF
            UPSTOX_API_KEY='${{ secrets.UPSTOX_API_KEY }}'
            UPSTOX_API_SECRET='${{ secrets.UPSTOX_API_SECRET }}'
            REDIRECT_URI='${{ secrets.REDIRECT_URI }}'
            AUTH_CODE='${{ secrets.AUTH_CODE }}'
            NODE_ENV='production'
            PORT=3000
            EOF
            
            pm2 delete market-feed 2>/dev/null || true
            pm2 delete chart-server 2>/dev/null || true

            # Start market feed (main app)
            pm2 start index.js --name market-feed --node-args="--env-file=.env"
            
            # Start chart server separately
            pm2 start chartServer.js --name chart-server --node-args="--env-file=.env"
            
            # Save PM2 configuration
            pm2 save
            
            # Setup PM2 to start on boot (only needed once)
            pm2 startup systemd -u ubuntu --hp /home/ubuntu 2>/dev/null || true

            # Verify both processes are running
            echo "=== PM2 Process Status ==="
            pm2 list